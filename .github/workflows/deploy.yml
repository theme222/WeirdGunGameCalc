name: Build and Deploy wggcalc-web

on:
  push:
    branches: ["main", "web"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  setup-and-compile:
    name: Setup & Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Prepare Data
        run: |
          mkdir -p Web/public
          cp Data/FullData.json Web/public/

      - name: Download nlohmann/json
        run: |
          mkdir -p include
          curl -L -o include/json.hpp https://github.com/nlohmann/json/releases/latest/download/json.hpp

      - name: Compile WASM
        run: |
          em++ -std=c++20 \
          -Iinclude wggcalc-wasm.cpp \
          -o Web/src/libs/wggcalc.js \
          --bind --no-entry \
          -s MODULARIZE=1 \
          -s EXPORT_NAME='createModule' \
          -s EXPORT_ES6=1 \
          --emit-tsd wggcalc.d.ts \
          -O3 -flto -Werror

      - name: Upload compiled files
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build-artifacts
          path: |
            Web/public/FullData.json
            Web/src/libs/wggcalc.js
            Web/src/libs/wggcalc.wasm
            Web/src/libs/wggcalc.d.ts

  build-vue:
    name: Build
    runs-on: ubuntu-latest
    needs: setup-and-compile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download compiled files
        uses: actions/download-artifact@v4
        with:
          name: wasm-build-artifacts
          path: ./Web

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies and Build
        working-directory: ./Web
        run: |
          bun install
          bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Web/dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-vue
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
